<!DOCTYPE html>
<!-- Declara el tipo de Documento. Indica Al Navegador que usara HTML 5 -->
<html lang="es">
<!-- Elemento princpal del documento HMTL. lang="es"- indica que el contenido esta en español -->

<head> <!-- Seccion de configuracion del documento-->
    <meta charset="UTF-8">
    <!-- Define la condificacion de caracteres. UTF-8 Permite usar correctamente tildes, ñ, simbolos, etc -->
    <meta name="viewport" content="width=device-width, initial-sacle=1.0">
    <!-- Hace que el sitio sea Responsive. Permite que el diseño se adapte correctamente a celulares y tablets-->
    <title>Practicando HTML - img y video</title>
    <!-- Titulo que aparece en el navegador-->
    <meta name="author" content="Leonardo Pacheco">
    <!-- Indica quien creo el sitio Web-->

    <link rel="stylesheet" href="static/css/style.css">
    <!-- Conexion con hoja CSS de estilos-->
</head>

<body>
    <header> <!-- Encabezado del documento-->
        <h1>Sitio Multimedia Personal</h1>
    </header>
    <hr> <!-- Crea una Linea de Division-->
    <main> <!-- Seccion Principal Del Documento -->
        <h2>Mis Datos: </h2>
        <p>Nombre: Leonardo Pacheco <br>
            Curso: 3°C
        </p>
        <hr>
        <h2>Galeria Multimedia</h2>
        <p>Imagen De Ejemplo</p>
        <img src="static/images/imagen1.png" alt="Primera Imagen" width="300">
        <img src="static/images/imagen2.png" alt="Segunda Imagen" width="350" height="800">
        <img src="static/images/imagen3.png" alt="Segunda Imagen" width="500" height="800">
        <hr>
        <h2>Videos</h2>
        <video width="600" controls height="500">
            <source src="static/videos/Video1.mp4" type="video/mp4">
        </video>
        <video width="600" controls height="500">
            <source src="static/videos/Video2.mp4" type="video/mp4">
        </video>
    </main>
    <footer>
        <p style="text-align:center"> Todos los derechos Reservados
            - <a href="https://megamitensei.fandom.com/wiki/Persona_Q2:_New_Cinema_Labyrinth">Mas Informacion</a> <!-- Etiqueta a Para Vinculos -->
        </p>
    </footer>
</body>

</html>
